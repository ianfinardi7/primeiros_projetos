<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../arquivoscss/fourthproject.css">
</head>
<body>
    <main>
    <form class="BANANA">
<label for="usuário">Nome:</label>
<input type="text" id="usuário" placeholder="Digite seu nome: ">
<br>
<label for="email">E-mail:</label>
<input type="text" id="email" placeholder="Digite seu e-mail: ">
<br>
<label for="nascimento">Data de Nascimento:</label>
<input type="date" id="nascimento" placeholder="Digite sua Data de Nascimento: ">
<br>
<label for="linguagem">Linguagem preferida:</label>
<select>
    <option value="1">HTML</option>
    <option value="2">CSS</option>
    <option value="3">JavaScript</option>
</select>
<br>
<label for="genero">Genero:</label>
<select>
    <option value="1">Masculino</option>
    <option value="2">Feminino</option>
    <option value="3">Prefiro não responder</option>
</select>
<br>
<label for="você">Sobre Voce:</label>
<textarea rows="5" cols="21" placeholder="Fale um pouco sobre voce: "></textarea>
<br>
<label for="senha">Senha:</label>
<input type="number" id="senha" placeholder="Digite sua senha: ">
<br>
<label for="senha2">Confirme sua senha:</label>
<input type="number" id="senha2" placeholder="Confirme sua senha: ">
<br>
<label for="botao">Clique aqui: </label>
<button>CADASTRAR</button>

</form>
    </main>
    
</body>
</html>
